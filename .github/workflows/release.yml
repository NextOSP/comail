name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    name: Build & release (${{ matrix.name }})
    permissions:
      contents: write
    # Gate the updater SIGNING KEY behind a protected environment. Create an
    # environment named "release" in repo Settings -> Environments, add required
    # reviewer(s), and store TAURI_SIGNING_PRIVATE_KEY[_PASSWORD] as *environment*
    # secrets (not repo secrets). Then a pushed tag can't sign & ship an update
    # until a human approves the run - so a malicious tag/commit can't reach the
    # auto-updater on its own.
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-22.04
            args: "--bundles deb,appimage"
          - name: macos-universal
            runner: macos-14
            # `app` produces Comail.app plus the .app.tar.gz updater artifact;
            # without an explicit list the config's Linux-only targets apply
            # and macOS bundles nothing.
            args: "--target universal-apple-darwin --bundles app,dmg"
          - name: windows-x64
            runner: windows-latest
            args: "--bundles msi,nsis"

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libdbus-1-dev build-essential curl wget file pkg-config

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.runner == 'macos-14'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # --- Apple code signing + notarization (macOS only) -------------------
      # OFF by default: the macOS .app is ad-hoc signed, which builds fine.
      # To enable real signing: obtain the cert + secrets (see
      # src-tauri/CODESIGNING.md), add them as repo secrets, then set the
      # repository VARIABLE `ENABLE_APPLE_SIGNING` to `true`
      # (Settings -> Secrets and variables -> Actions -> Variables).
      #
      # This is a separate step (not `env:` on tauri-action) on purpose: an
      # `env:` entry that resolves to '' is still SET, and tauri treats a set
      # APPLE_CERTIFICATE as "sign with this", imports an empty cert, and the
      # whole build dies with "failed to import keychain certificate". Writing
      # to $GITHUB_ENV only when enabled leaves the variables truly unset
      # otherwise. Validate secrets cheaply with the "Check Apple signing
      # secrets" workflow before tagging.
      - name: Enable Apple code signing
        if: matrix.runner == 'macos-14' && vars.ENABLE_APPLE_SIGNING == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE<<__CERT__"
            echo "${{ secrets.APPLE_CERTIFICATE }}"
            echo "__CERT__"
            echo "APPLE_CERTIFICATE_PASSWORD<<__PW__"
            echo "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "__PW__"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD<<__APW__"
            echo "${{ secrets.APPLE_PASSWORD }}"
            echo "__APW__"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build and release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and uploads latest.json to the release.
          # Set these two repo secrets from the generated key (see README).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Comail ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version of Comail."
          # Publish immediately instead of leaving an unpublished draft that a
          # human must click "Publish" on. The human-review checkpoint for the
          # signing key is the `environment: release` gate above (required
          # reviewers approve the run before it builds/signs), so keeping the
          # release as a draft only hid the finished binaries from users.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
