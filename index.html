<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comail</title>
    <script>
      // Apply the last-known theme before first paint to avoid a flash.
      (function () {
        var theme;
        try {
          theme = localStorage.getItem("comail:theme");
        } catch (e) {}
        if (theme !== "snow" && theme !== "carbon" && theme !== "holiday") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "carbon" : "snow";
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor =
          theme === "carbon" ? "#141413" : theme === "holiday" ? "#f4f7fa" : "#faf9f7";
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
